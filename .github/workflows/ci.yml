name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WebApp/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
